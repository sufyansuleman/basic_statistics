name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'



      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("here","tidyverse","janitor","readxl","writexl","survival","survminer","broom","gtsummary","gt","glue","lubridate","patchwork","cowplot","modelr","targets","tarchetypes"), repos="https://cloud.r-project.org")'

      - name: Render course site
        run: quarto render

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Confirm dev_code_data is ignored
        run: git check-ignore -v dev_code_data
