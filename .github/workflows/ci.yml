name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install Quarto
        uses: quarto-dev/quarto-action@v3
        with:
          install: true

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("here","tidyverse","janitor","readxl","writexl","survival","survminer","broom","gtsummary","gt","glue","lubridate","patchwork","cowplot","modelr","targets","tarchetypes"), repos="https://cloud.r-project.org")'

      - name: Render course site
        run: quarto render

      - name: Confirm dev_code_data is ignored
        run: git check-ignore -v dev_code_data
