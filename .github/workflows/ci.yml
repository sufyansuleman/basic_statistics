name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install Quarto CLI
        run: |
          set -euo pipefail
          echo "Installing Quarto CLI"
          # Primary: direct latest asset link
          PRIMARY_URL="https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.tar.gz"
          # Try primary URL first (follow redirects), otherwise query GitHub API for the latest tag and attempt explicit download
          if curl -fSL "$PRIMARY_URL" -o /tmp/quarto.tar.gz; then
            echo "Downloaded Quarto (latest asset)."
          else
            echo "Primary download failed; falling back to GitHub API lookup for latest tag..."
            TAG=$(curl -sSL https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest | grep -m1 '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$TAG" ]; then
              echo "Unable to determine latest Quarto tag from GitHub API" >&2
              exit 1
            fi
            ASSET="quarto-${TAG}-linux-amd64.tar.gz"
            URL="https://github.com/quarto-dev/quarto-cli/releases/download/${TAG}/${ASSET}"
            echo "Attempting to download $URL"
            curl -fSL "$URL" -o /tmp/quarto.tar.gz
          fi
          tar -xzf /tmp/quarto.tar.gz -C /tmp
          sudo mv /tmp/quarto-* /opt/quarto
          sudo ln -sf /opt/quarto/bin/quarto /usr/local/bin/quarto
          quarto --version

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("here","tidyverse","janitor","readxl","writexl","survival","survminer","broom","gtsummary","gt","glue","lubridate","patchwork","cowplot","modelr","targets","tarchetypes"), repos="https://cloud.r-project.org")'

      - name: Render course site
        run: quarto render

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

      - name: Confirm dev_code_data is ignored
        run: git check-ignore -v dev_code_data
