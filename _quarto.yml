project:
  type: book
  output-dir: docs

book:
  title: "Simple basic statistics concepts"
  subtitle: "Foundations of statistical reasoning, data interpretation, and evidence-based decision making"
  author:
    - name: "Sufyan Suleman"
      affiliation: "Novo Nordisk Foundation Center for Basic Metabolic Research, University of Copenhagen Denmark"
    - name: "Asmat Ullah"
      affiliation: "Department of Biomedicine, Faculty of Health, Aarhus University Denmark"
  chapters:
  - index.qmd
  - sessions/setup.qmd
  - part: "Part 1: Inference — Testing and Estimation"
    chapters:
    - sessions/sampling-and-estimation.qmd
    - sessions/hypothesis-testing.qmd
    - sessions/t-tests.qmd
    - sessions/nonparametric-tests.qmd
    - sessions/anova.qmd
    - sessions/categorical-data-and-chi-square.qmd
    - sessions/power-and-sample-size.qmd
  - part: "Part 2: Regression and Modeling"
    chapters:
    - sessions/correlation-and-association.qmd
    - sessions/linear-regression.qmd
    - sessions/multiple-regression.qmd
    - sessions/logistic-regression.qmd
    - sessions/model-building-and-diagnostics.qmd
    - sessions/data-imputation.qmd
    - sessions/mixed-models.qmd
  - part: "Part 3: Advanced Methods"
    chapters:
    - sessions/survival-and-time-to-event.qmd
    - sessions/causal-inference.qmd
    - sessions/mendelian-randomization.qmd
    # Omics and Bayesian sessions removed to keep the course focused on core statistics
  - part: "Part 4: Reference and Resources"
    chapters:
    - sessions/statistical-decision-guide.qmd
    - sessions/clinical-research-methods.qmd
    - sessions/help-docs.qmd

bibliography:
  - references.bib

editor:
  markdown:
    wrap: 72
    canonical: true

format:
  html:
    theme: "cosmo"
    number-sections: true

execute:
  freeze: auto
